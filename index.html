<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HexCrawl Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #16213e;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .controls label { font-size: 13px; }
    .controls input, .controls select, .controls button {
      padding: 4px 8px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #0f3460;
      color: #eee;
      font-size: 13px;
    }
    .controls button {
      cursor: pointer;
      background: #e94560;
      border-color: #e94560;
      font-weight: 600;
    }
    .controls button:hover { background: #c73e54; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: #aaa;
      margin-left: auto;
    }
    #map-container {
      flex: 1;
      overflow: auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #map-stack {
      position: relative;
      display: inline-block;
    }
    #map-stack canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    #map-stack canvas:first-child {
      position: relative;
    }
  </style>
</head>
<body>
  <header>
    <h1>HexCrawl Studio</h1>
    <div class="controls">
      <label>Seed: <input type="number" id="seed" value="1000" min="1" style="width:80px"></label>
      <label>Radius: <input type="number" id="radius" value="4" min="1" max="40" style="width:50px"></label>
      <label>Hex Width: <input type="number" id="hexWidth" value="200" min="100" max="400" step="50" style="width:60px"></label>
      <button id="btn-generate">Generate Map</button>
    </div>
    <span id="status">Ready</span>
  </header>
  <div id="map-container">
    <div id="map-stack"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
